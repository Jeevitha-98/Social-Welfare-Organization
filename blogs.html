<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly Welfare Foundation</title>
    <meta name="description" content="Stackly Foundation - Layering support, stacking hope, and building sustainable futures for communities worldwide.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Social Welfare Human-Centric Preloader -->
    <div id="welfare-preloader">
       

        <div class="preloader-body">
            
            <!-- Creative Visual Anchor: Responsive Vector Lifecycle Logo -->
            <div class="vector-logo-container">
                <svg xmlns="http://w3.org" viewBox="0 0 100 100" class="welfare-vector">
                    <!-- Layer 1: Left Growing Leaf (Vector) -->
                    <path class="vec-leaf-left" d="M35 50 C20 40, 20 20, 45 30 C45 45, 40 50, 35 50 Z" fill="none" stroke="#a5d6a7" stroke-width="2.5" stroke-linecap="round"/>
                    
                    <!-- Layer 2: Right Growing Leaf (Vector) -->
                    <path class="vec-leaf-right" d="M65 50 C80 40, 80 20, 55 30 C55 45, 60 50, 65 50 Z" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"/>
                    
                    <!-- Layer 3: Central Supporting Hands Cradle (Vector) -->
                    <path class="vec-hands-cradle" d="M30 65 C40 80, 60 80, 70 65 C60 68, 40 68, 30 65 Z" fill="none" stroke="#f57c00" stroke-width="3" stroke-linecap="round"/>
                    <path class="vec-heart" d="M50 58 C45 52, 40 55, 50 63 C60 55, 55 52, 50 58 Z" fill="#f57c00"/>
                </svg>
            </div>

            <!-- Brand Typography -->
            <h1 class="brand-title">Stackly</h1>
            <p class="brand-subtext">Welfare Foundation</p>

            <!-- Creative Stacking Block Loader (Symbolizes building blocks of life) -->
            <div class="building-blocks">
                <div class="block block-1"></div>
                <div class="block block-2"></div>
                <div class="block block-3"></div>
            </div>

            <!-- Real-time Mission Statement Reveal -->
            <div class="mission-ticker">
                <span id="ticker-text">Stacking Hope...</span>
            </div>
        </div>
    </div>

   
   <script>
    document.addEventListener("DOMContentLoaded", () => {
    
    const preloader = document.getElementById("welfare-preloader");
    const tickerText = document.getElementById("ticker-text");

    const structuralPhrases = [
        "Stacking hope...",
        "Layering community resources...",
        "Building reliable foundations..."
    ];

    setTimeout(() => { tickerText.innerText = structuralPhrases[1]; }, 1000);
    setTimeout(() => { tickerText.innerText = structuralPhrases[2]; }, 2000);

    // Smooth exit animation
    setTimeout(() => {
        preloader.style.opacity = "0";
        preloader.style.transform = "translateY(-40px)";
        
        setTimeout(() => {
            preloader.remove();
        }, 800);

    }, 3400); 
});

   </script>

 <!-- Floating Translucent Capsule Header Wrapper -->
<!-- Fixed Transparent Header Capsule Layer -->
<!-- Fixed Transparent Header Capsule Layer -->
<header class="site-header-floating">
    <div class="header-capsule-container">
        
        <!-- Brand Logo Block Area -->
        <a href="#" class="brand-logo-link" id="logoLink" aria-label="Stackly Home, Refresh Platform">
            <div class="logo-glow-layer"></div>
            <img src="./Assests/Social welfare - logo.webp" alt="Stackly Logo" class="brand-logo-img" onerror="this.style.display='none';">
           
        </a>

        <!-- Unified Slide-Out Sidebar Container (Exactly 75% Width on Mobile Layout Screens) -->
        <nav class="navigation-bar" id="navigationBar" aria-label="Primary Platform Navigation">
            
            <!-- Core Navigation Menu Links Matrix -->
            <ul class="menu-links-list" id="menuList">
                <li class="menu-item"><a href="index.html" class="nav-anchor active-route">Home</a></li>
                <li class="menu-item"><a href="about.html" class="nav-anchor">About Us</a></li>
                <li class="menu-item"><a href="campaigns.html" class="nav-anchor">Campaigns</a></li>
                <li class="menu-item"><a href="blog.html" class="nav-anchor">Blog</a></li>
                <li class="menu-item"><a href="contact.html" class="nav-anchor">Contact</a></li>
            </ul>

            <!-- Nested Access Portal buttons (Keeps layout grouped neatly inside mobile overlays) -->
            <div class="auth-buttons-group" id="authGroup">
                <a href="login.html" class="btn-gateway btn-login-glass">Login</a>
                <a href="signup.html" class="btn-gateway btn-signup-glow">Sign Up</a>
            </div>

        </nav>

        <!-- Touch Optimized Menu Open/Close Toggle Hamburger Trigger -->
        <button class="hamburger-menu-trigger" id="hamburgerTrigger" aria-expanded="false" aria-controls="navigationBar" aria-label="Toggle Mobile Viewport Menu Openings">
            <span class="burger-bar bar-top"></span>
            <span class="burger-bar bar-mid"></span>
            <span class="burger-bar bar-bottom"></span>
        </button>

    </div>
</header>




<script>
  document.addEventListener("DOMContentLoaded", () => {

    const header = document.querySelector(".site-header-floating");
    const hamburgerTrigger = document.getElementById("hamburgerTrigger");
    const navAnchors = document.querySelectorAll(".nav-anchor");
    const bodyElement = document.body;

    // Hamburger State Switch Action Listener
    hamburgerTrigger.addEventListener("click", () => {
        const isMenuOpen = header.classList.toggle("mobile-active");
        hamburgerTrigger.setAttribute("aria-expanded", isMenuOpen);

        // Activates strict backdrop background navigation lock sequence
        if (isMenuOpen) {
            bodyElement.classList.add("scroll-locked");
        } else {
            bodyElement.classList.remove("scroll-locked");
        }
    });

    // Close panel container layout structure when target link executes
    navAnchors.forEach(anchor => {
        anchor.addEventListener("click", () => {
            header.classList.remove("mobile-active");
            bodyElement.classList.remove("scroll-locked");
            hamburgerTrigger.setAttribute("aria-expanded", "false");
        });
    });
});

</script>
