<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Social Welfare Organization</title>

<meta name="description"
content="The page you are looking for could not be found. Return to the Social Welfare Organization homepage and continue exploring our community initiatives.">

<link rel="stylesheet" href="css/404.css">

</head>

<body>

<section class="error-page">

    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="error-card">

        <a href="index.html" class="logo">

            <img src="./Assests/Social welfare - logo.webp"
                 alt="Social Welfare Organization Logo">

        </a>

        <div class="error-content">

            <div class="error-image">

                <img src="./Assests/grp volu.webp"
                     alt="404 Page Not Found Illustration">

            </div>

            <div class="error-text">

                <span class="subtitle">
                    Oops! Something went wrong
                </span>

                <h1>404</h1>

                <h2>Page Not Found</h2>

                <p>

                    The page you're looking for may have been moved,
                    deleted, or the URL may be incorrect.

                    Continue exploring our initiatives and
                    discover how we're creating positive change
                    together.

                </p>

                <div class="buttons">

                    <a href="index.html" class="primary-btn">

                        Back to Home

                    </a>

                    <a href="contact.html" class="secondary-btn">

                        Contact Us

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

background:linear-gradient(135deg,#17b566,#f8fff9);

overflow-x:hidden;

}

.error-page{

position:relative;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

overflow:hidden;

}

.bg-circle{

position:absolute;

border-radius:50%;

filter:blur(120px);

opacity:.35;

animation:float 10s ease-in-out infinite;

}

.circle-1{

width:350px;

height:350px;

background:#34d399;

top:-100px;

left:-100px;

}

.circle-2{

width:420px;

height:420px;

background:#86efac;

right:-120px;

bottom:-120px;

animation-delay:4s;

}

.error-card{

width:100%;

max-width:1350px;

background:black;

backdrop-filter:blur(25px);

border-radius:30px;

padding:60px;

box-shadow:0 30px 60px rgba(0,0,0,.08);

}

.logo img{

height:70px;

margin-bottom:30px;

transition:.4s;

}

.logo img:hover{

transform:scale(1.08);

filter:drop-shadow(0 0 18px rgba(5,150,105,.45));

}

.error-content{

display:grid;

grid-template-columns:1fr 1fr;

gap:60px;

align-items:center;

}

.error-image{

text-align:center;

}

.error-image img{

width:100%;

max-width:520px;

animation:floating 5s ease-in-out infinite;

transition:.4s;

}

.error-image img:hover{

transform:scale(1.04);

filter:drop-shadow(0 0 25px rgba(5,150,105,.45));

}

.subtitle{

display:inline-block;

padding:10px 22px;

border-radius:50px;

background:#ffffff;

color:#059669;

font-weight:600;

box-shadow:0 12px 25px rgba(0,0,0,.08);

margin-bottom:25px;

}

.error-text h1{

font-size:130px;

line-height:1;

color:#059669;

text-shadow:0 0 25px rgba(16,185,129,.35);

margin-bottom:10px;

}

.error-text h2{

font-size:42px;

margin-bottom:25px;

color: white;

}

.error-text p{

font-size:18px;

line-height:1.9;

color: white;

margin-bottom:40px;

}

.buttons{

display:flex;

gap:20px;

flex-wrap:wrap;

}

.primary-btn,
.secondary-btn{

padding:16px 34px;

border-radius:50px;

font-weight:600;

text-decoration:none;

transition:.35s;

}

.primary-btn{

background:#059669;

color:white;

box-shadow:0 15px 35px rgba(5,150,105,.25);

}

.primary-btn:hover{

transform:translateY(-6px);

box-shadow:0 0 35px rgba(5,150,105,.55);

}

.secondary-btn{

border:2px solid #059669;

color:#059669;

background:white;

}

.secondary-btn:hover{

background:#059669;

color:white;

box-shadow:0 0 30px rgba(5,150,105,.45);

}

@keyframes floating{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-15px);

}

}

@keyframes float{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(30px);

}

}

@media(max-width:992px){

.error-content{

grid-template-columns:1fr;

text-align:center;

}

.buttons{

justify-content:center;

}

.error-text h1{

font-size:100px;

}

.error-text h2{

font-size:34px;

}

}

@media(max-width:576px){

.error-card{

padding:35px 25px;

}

.error-text h1{

font-size:72px;

}

.error-text h2{

font-size:26px;

}

.error-text p{

font-size:16px;

}

.logo img{

height:55px;

}

.primary-btn,
.secondary-btn{

width:100%;

text-align:center;

}

}
</style>
</body>
</html>
